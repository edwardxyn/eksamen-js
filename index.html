<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts Yearbook</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1 class="site-title">⚡Hogwarts Yearbook⚡</h1>
        <a href="game.html" class="play-btn">Play Our Game</a>
    </header>
    <main>
        <div id="saved-students">
            <h2>Saved Students (max 3)</h2>
            <div id="saved-list"></div>
        </div>
        <div id="student-form">
            <h2>Create Your Own Hogwarts Student</h2>
            <input type="text" id="input-name" placeholder="Name">
            <input type="number" id="input-age" placeholder="Year of birth (e.g. 1980)">
            <select id="input-house">
                <option value="Gryffindor">Gryffindor</option>
                <option value="Slytherin">Slytherin</option>
                <option value="Ravenclaw">Ravenclaw</option>
                <option value="Hufflepuff">Hufflepuff</option>
            </select>
            <input type="text" id="input-wood" placeholder="Wand wood">
            <input type="text" id="input-core" placeholder="Wand core">
            <input type="number" id="input-length" placeholder="Wand length">
            <button id="create-btn">Create Student</button>
        </div>
        <h1>Filter By House</h1>
        <div id="filter-row">
            <div id="house-filters"></div>
            <select id="sorting-dropdown">
                <option value="">Sort by age</option>
                <option value="youngest">Youngest first</option>
                <option value="oldest">Oldest first</option>
            </select>
        </div>
        <div id="output"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
